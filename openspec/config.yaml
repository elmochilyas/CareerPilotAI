  Database version policy:
  - Target architecture baseline: MySQL 8.4 LTS.
  - Current local service is MySQL80.
  - Do not use features unavailable locally without an approved compatibility/upgrade decision.
  - A database upgrade is a separate environment change, not a reason to install XAMPP.

  Local drivers:
  - QUEUE_CONNECTION=database.
  - CACHE_STORE=file or database.
  - SESSION_DRIVER=file or database.

  Forbidden substitutions:
  - Do not install or use XAMPP, WAMP, MariaDB, SQLite, Docker, Laravel Sail, Redis,
