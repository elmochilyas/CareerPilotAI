  Authority and conflict policy:
  - This file is the project-wide source of truth for stable product, architecture,
    security, quality, and delivery decisions.
  - Accepted feature requirements live under openspec/specs/.
  - Active changes under openspec/changes/ define bounded deltas only.
  - OpenAPI, migrations, tests, and implementation must match approved OpenSpec artifacts.
  - The detailed reference document is CareerPilot_AI_PRD_Ilyas_El_Moch v1.4.
  - When sources conflict, do not guess. Stop, identify the conflict, and resolve it
    through /opsx:update or a new OpenSpec change.
  - MUST and SHALL are mandatory. SHOULD may be deferred only with a documented reason.
