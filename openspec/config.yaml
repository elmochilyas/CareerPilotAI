  # PRODUCT VISION AND USERS
  Vision: From job offer to interview — with a profile that grows with the market.

  Product definition:
  CareerPilot AI is a web career operating system for young graduates and junior
  professionals. A candidate creates a structured master profile, imports or enters
  evidence, adds an opportunity, receives an explainable match analysis, answers
  targeted clarifications, generates a truthful ATS-friendly resume, tracks the
  application, prepares for interviews, and receives a learning roadmap based on
  recurring market gaps.

  Primary persona:
  - Junior tech candidate: bootcamp, university, or OFPPT graduate; intern, junior
    developer, or career switcher.
  - Needs: understand fit, tailor applications truthfully, organize applications,
    prepare effectively, and decide what to learn next.
  - Constraints: limited experience, time, and budget; incomplete professional
    vocabulary; inconsistent CV quality.

  Secondary MVP persona:
  - Platform administrator.
  - Manages users, prompt versions, quotas, failed jobs, templates, and operational health.
  - Candidate private documents are default-denied. Support access needs a documented
    reason and an audit event.

  Future personas:
  - Career coach.
  - Bootcamp or university operator.
  - Organization administrator.
  - Recruiter or mentor with candidate-granted access.

  MVP goals:
  - Deliver one complete end-to-end candidate workflow.
  - Demonstrate serious Laravel backend engineering and meaningful AI orchestration.
  - Generate real editable and downloadable PDF and DOCX resumes.
  - Provide market-aligned skill-gap analytics.
  - Deploy a secure, observable product with seeded demonstration data.

  MVP non-goals:
  - Aggressive LinkedIn or job-board scraping.
  - Automatic applications, browser autofill, or recruiter outreach automation.
  - Guaranteed ATS scores or employment outcomes.
  - Microservices, Kubernetes, multi-region operations, or premature Octane.
  - Native mobile applications, voice interviews, enterprise dashboards, billing,
    multi-organization tenancy, browser extensions, calendar sync, or email sync.

  # NON-NEGOTIABLE PRINCIPLES
  Truth before optimization:
  - AI may improve wording, order, clarity, and relevance.
  - AI must never invent a skill, project, experience, certification, achievement, or
    factual claim.
  - Every resume fact must be traceable to trusted profile data or confirmed evidence.
  - Missing capabilities remain missing, uncertain, or learning.

  Explainability:
  - Scores, gaps, recommendations, extracted facts, and AI-originated values expose their
    basis, confidence, provenance, and relevant versions.

  Human approval:
  - AI changes to the trusted profile remain proposals until the candidate approves them.
  - Approved resume versions are immutable; later edits create a new version.

  Async by default for expensive work:
  - CV parsing, job analysis, company research, AI generation, exports, and roadmap
    recalculation use queues.

  Privacy and security by design:
  - Candidate data is private by default.
  - Apply least privilege, minimization, retention, authorization-checked downloads,
    redacted logs, and audit events.

  Architecture discipline:
  - Use a modular monolith for the MVP.
  - Keep domain boundaries explicit.
  - Prefer first-party Laravel/Vue capabilities and mature dependencies.
  - Do not add a package, table, service, or abstraction without a concrete requirement
    and an owning module.

  # FUNCTIONAL REQUIREMENT CATALOG
  Identity and account lifecycle:
  - AUTH-001: Register with name, email, and password; email verification is required
    before AI or export features.
  - AUTH-002: Use Laravel Sanctum first-party SPA cookie authentication.
  - AUTH-003: Support login, logout, password reset, session revocation, and secure
    remember-me behavior.
  - AUTH-004: Rate-limit authentication and password-reset endpoints by account and IP.
  - AUTH-005: Expose current user and profile-completion state at /api/v1/me.
  - AUTH-006: Support audited asynchronous account export and deletion.

  Master profile:
  - PROF-001: One active master profile per candidate with version and locale metadata.
  - PROF-002: Headline, summary, contact links, preferred roles, locations, and remote
    preference.
  - PROF-003: CRUD education, training, experience, projects, certifications, languages,
    and achievements.
  - PROF-004: Profile items include source, confidence, verification state, and timestamps.
  - PROF-005: AI-originated changes remain proposed until explicit approval.
  - PROF-006: Preserve enough history to explain which resume used which profile data.

  Skills and evidence:
  - SKILL-001: Normalized skill catalog with aliases and categories.
  - SKILL-002: Candidate skill states are claimed, verified, learning, rejected, archived.
  - SKILL-003: Verified skills should reference project, experience, training,
    certification, or repository evidence.
  - SKILL-004: AI cannot promote a skill to verified without explicit confirmation.
  - SKILL-005: Proficiency and evidence strength are separate concepts.
  - SKILL-006: Normalize aliases without losing original wording.

  CV ingestion:
  - CVIN-001: Accept PDF/DOCX within configured size and MIME-signature limits.
  - CVIN-002: Store privately with generated names and scan status.
  - CVIN-003: Queue extraction and AI structuring; make operations idempotent.
  - CVIN-004: Show confidence and source-page references when available.
  - CVIN-005: Candidate accepts, edits, or rejects items before profile merge.
  - CVIN-006: Safe failures expose controlled codes and allow retry or manual entry.

  Opportunity ingestion:
  - JOB-001: Add through pasted text, PDF/DOCX, image fallback, or permitted public URL.
  - JOB-002: URL fetch enforces SSRF protection, redirect, type, size, and timeout limits.
  - JOB-003: If fetch is blocked or disallowed, require paste/upload fallback.
  - JOB-004: Extract title, company, location, contract, seniority, responsibilities,
    skills, languages, education, salary, and deadline when present.
  - JOB-005: Every requirement stores importance, confidence, source, and evidence snippet.
  - JOB-006: Version original content and normalized analyses.

  Company research:
  - COMP-001: Create/reuse companies by normalized name and website domain.
  - COMP-002: Store permitted source URL, title, retrieval date, and claims.
  - COMP-003: Separate confirmed facts, inference, and unavailable information.
  - COMP-004: Provide company summary, role context, talking points, and questions.
  - COMP-005: Refresh research without overwriting historical context.

  Matching and clarification:
  - MATCH-001: Final numeric score is deterministic Laravel code, never direct LLM output.
  - MATCH-002: Expose category scores, matches, uncertain items, gaps, and suggestions.
  - MATCH-003: AI classification/normalization must pass schema and business validation.
  - MATCH-004: High-impact uncertainty creates clarification questions, not silent changes.
  - MATCH-005: Profile-changing answers require evidence or explicit no-evidence acknowledgement.
  - MATCH-006: Every recomputation creates a snapshot linked to exact source versions.

  Resume tailoring and export:
  - RES-001: Generate from trusted profile data, selected analysis, and template.
  - RES-002: Improve truthful content without inventing facts.
  - RES-003: Candidate edits before approval.
  - RES-004: Approved versions are immutable.
  - RES-005: Export ATS-safe PDF/DOCX with template, generator version, and checksum.
  - RES-006: Application retains the exact sent resume and optional letter/email version.

  Application tracking:
  - APP-001: Opportunity may become an application when marked ready/applied.
  - APP-002: States are saved, analyzing, ready_to_apply, applied, hr_screening,
    interview_scheduled, technical_interview, final_interview, offer_received, accepted,
    rejected, archived.
  - APP-003: Status changes create immutable actor/timestamp/note history.
  - APP-004: Manage contacts, notes, documents, tasks, reminders, and interviews.
  - APP-005: Dashboard shows overdue tasks and upcoming interviews.
  - APP-006: Store optional rejection reasons and interview feedback.

  Interview preparation:
  - INT-001: Generate from exact analysis, company snapshot, resume, and interview stage.
  - INT-002: Include introduction, why-company, why-role, likely questions, technical
    review, candidate questions, and checklist.
  - INT-003: Text mock interviews ask one question at a time and store answers/feedback.
  - INT-004: Separate communication feedback from technical correctness and mark uncertainty.

  Learning roadmap:
  - ROAD-001: Aggregate demand across active saved opportunities.
  - ROAD-002: Rank gaps by occurrence, importance, recency, and target-role relevance.
  - ROAD-003: Show supporting opportunity count and measurable outcome.
  - ROAD-004: States are planned, in_progress, completed, skipped, archived.
  - ROAD-005: Completing learning never automatically verifies a skill.

  Platform operations:
  - PLAT-001: In-app notifications for completion, exports, failures, reminders, interviews.
  - PLAT-002: Email preferences are configurable.
  - PLAT-003: Enforce AI/export quotas atomically.
  - PLAT-004: Admins inspect failed jobs, retry eligible work, manage templates, and
    activate prompt versions.
  - PLAT-005: Sensitive admin actions produce audit events.

  # CORE STATES AND RULES
  Candidate skill states:
  - claimed: reported by candidate but evidence is absent/unreviewed; default no for
    critical resume claims.
  - verified: confirmed and linked to evidence; may appear as possessed.
  - learning: may appear only as learning/interest, never as experience.
  - rejected: must not appear.
  - archived: must not appear unless restored.

  Default match weights:
  - Required skills: 50 percent.
  - Preferred skills: 20 percent.
  - Relevant projects/evidence: 15 percent.
  - Experience/education: 10 percent.
  - Languages/soft skills: 5 percent.

  Match factors:
  - verified: 1.00.
  - claimed/needs clarification: 0.50 and shown separately.
  - learning: 0.20.
  - missing/rejected: 0.00.

  Formula:
  overall_score = round(
    required_skill_score * 0.50 +
    preferred_skill_score * 0.20 +
    evidence_relevance_score * 0.15 +
    experience_education_score * 0.10 +
    language_soft_skill_score * 0.05
  )

  Critical missing requirements create warnings independently of the score. Every match
  snapshot stores scoring version, profile version, and job-analysis version.

  Application transitions:
  - Validate in a dedicated domain service/state-machine policy.
  - saved -> analyzing.
  - analyzing -> ready_to_apply or saved_on_failure.
  - ready_to_apply -> applied.
  - applied -> hr_screening or rejected.
  - Any non-terminal state -> archived.
  - accepted and rejected are terminal unless reopened with a documented reason.

  Async states:
  - queued.
  - processing.
  - needs_input.
  - completed.
  - failed_retryable.
  - failed_final.
  - cancelled.

  # REPOSITORY AND ARCHITECTURE
  Monorepo:
  - backend/: Laravel API.
  - frontend/: Vue SPA.
  - openspec/: config, canonical specs, and changes.
  - docs/: ADRs, API docs, and runbooks.
  - infrastructure/: Nginx/deployment assets only when approved.
  - .github/workflows/: CI.
  - Root AGENTS.md, opencode.json, boost.json, README.md when created.

  Backend baseline:
  - PHP 8.4 and Laravel 13.
  - API-first modular monolith.
  - Laravel Sanctum first-party SPA cookie sessions.
  - MySQL relational persistence.
  - Database-backed queues for local and initial MVP.
  - File or database cache/session initially.
  - Laravel private local storage initially.
  - Laravel Scheduler.
  - Laravel AI SDK with OpenAI API as primary product AI provider.
  - Laravel Boost as a development dependency and local MCP integration.

  Backend domains:
  - Identity, Profile, Skills, Opportunities, Matching, Resumes, Applications, Learning,
    AI Operations, Platform.

  Backend organization:
  - app/Domain/<Domain>/{Actions,Data,Enums,Events,Policies,Services}.
  - app/Http/Controllers/Api/V1.
  - app/Http/Requests/Api/V1.
  - app/Http/Resources/Api/V1.
  - app/Support/{Audit,Idempotency,Pagination,ProblemDetails}.
  - tests/Unit/Domain, tests/Feature/Api/V1, tests/Integration, tests/Architecture.

  Backend standards:
  - Thin controllers: authorize, validate, invoke action/service, return API Resource.
  - Domain actions own transaction boundaries.
  - Models own relationships and small invariants, not workflows.
  - Use Form Requests, typed immutable DTOs, Policies, Actions/Services, and Resources.
  - Every owned resource lookup requires authorization; route binding is not enough.
  - Use DB transactions for multi-table business operations and dispatch jobs after commit.
  - Async creation/export uses idempotency keys or stable operation keys.
  - Never return Eloquent models directly.
  - Prevent N+1 queries, select required columns, and paginate collections.
  - Domain exceptions map to stable problem codes; never expose stack traces.
  - Application code never calls env() directly.
  - Queue jobs define queue, retry/backoff, timeout, uniqueness where needed, and safe failure.

  Frontend baseline:
  - Vue 3 Composition API, TypeScript strict, SFCs with <script setup lang="ts">, Vite.
  - Vue Router with lazy routes and typed metadata.
  - Pinia only for auth/session UI state, preferences, and cross-route drafts.
  - TanStack Vue Query for server state, invalidation, retries, and polling.
  - Axios with credentials/XSRF for Sanctum and centralized problem mapping.
  - VeeValidate plus Zod, or an approved equivalent.
  - Tailwind CSS plus accessible headless primitives and design tokens.
  - Vitest and Vue Test Utils; Playwright for critical journeys later.

  Frontend organization:
  - src/app/{router,providers,layouts}.
  - src/api/{client,generated,problem-details}.
  - src/features/{auth,profile,opportunities,matching,resumes,applications,interviews,roadmap}.
  - src/components/{ui,forms,feedback}, src/composables, src/stores, src/types, src/assets.

  Frontend standards:
  - Keep pages, queries, mutations, schemas, and components in their feature folder.
  - Keep business rules in Laravel; composables orchestrate UI behavior.
  - Do not copy all API data into Pinia.
  - Every async screen has loading, empty, validation, authorization, retry, and failure states.
  - Semantic HTML, keyboard support, focus management, labels, contrast, and screen-reader
    announcements are mandatory.
  - Avoid unsanitized v-html.
  - Handle 401 and 419 globally without infinite retries.

