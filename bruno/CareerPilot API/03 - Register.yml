info:
  name: 03 - Register
  type: http
  seq: 4

http:
  method: POST
  url: "{{baseUrl}}/api/v1/auth/register"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
    - name: Origin
      value: "{{frontendUrl}}"
    - name: Referer
      value: "{{frontendUrl}}/"
    - name: X-XSRF-TOKEN
      value: 
  body:
    type: json
    data: |-
      {
        "full_name": "Bruno Test",
        "email": "bruno.test@example.com",
        "password": "Password123!",
        "password_confirmation": "Password123!"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
