info:
  name: 09 - Update Languages
  type: http
  seq: 9

http:
  method: PATCH
  url: "{{baseUrl}}/api/v1/profile"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
    - name: Origin
      value: "{{frontendUrl}}"
    - name: Referer
      value: "{{frontendUrl}}/"
  body:
    type: json
    data: |-
      {
        "languages": [
          {
            "language": "English",
            "proficiency": "fluent"
          },
          {
            "language": "French",
            "proficiency": "advanced"
          },
          {
            "language": "Arabic",
            "proficiency": "native"
          }
        ]
      }
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const xsrfToken = bru.cookies.get("XSRF-TOKEN");

        if (!xsrfToken) {
          throw new Error(
            "XSRF-TOKEN cookie is missing. Run 02 - CSRF Cookie first."
          );
        }

        req.setHeader(
          "X-XSRF-TOKEN",
          decodeURIComponent(xsrfToken)
        );
    - type: after-response
      code: |-
        test("Status code is 200", function () {
          expect(res.getStatus()).to.equal(200);
        });

        test("Response is JSON", function () {
          expect(res.getHeader("content-type")).to.include("application/json");
        });

        test("Languages are returned as an array", function () {
          const body = res.getBody();
          const profile = body.data ?? body;

          expect(profile.languages).to.be.an("array");
        });

        test("All languages and proficiencies were saved", function () {
          const body = res.getBody();
          const profile = body.data ?? body;

          expect(profile.languages).to.deep.include({
            language: "English",
            proficiency: "fluent"
          });
          expect(profile.languages).to.deep.include({
            language: "French",
            proficiency: "advanced"
          });
          expect(profile.languages).to.deep.include({
            language: "Arabic",
            proficiency: "native"
          });
        });

        test("Profile completion remains between 0 and 100", function () {
          const body = res.getBody();
          const profile = body.data ?? body;

          expect(profile.profile_completion).to.be.at.least(0);
          expect(profile.profile_completion).to.be.at.most(100);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5