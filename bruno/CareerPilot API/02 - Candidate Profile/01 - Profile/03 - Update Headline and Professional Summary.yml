info:
  name: 03 - Update Headline and Professional Summary
  type: http
  seq: 3

http:
  method: PATCH
  url: "{{baseUrl}}/api/v1/profile"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
    - name: Origin
      value: "{{frontendUrl}}"
    - name: Referer
      value: "{{frontendUrl}}/"
  body:
    type: json
    data: |-
      {
        "headline": "Full Stack Developer | Laravel and Vue.js",
        "professional_summary": "Full Stack Developer focused on building reliable web applications with Laravel, Vue.js and TypeScript. Experienced in REST API development, responsive interfaces and clean, maintainable software architecture."
      }
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const xsrfToken = bru.cookies.get("XSRF-TOKEN");

        if (!xsrfToken) {
          throw new Error(
            "XSRF-TOKEN cookie is missing. Run 02 - CSRF Cookie first."
          );
        }

        req.setHeader(
          "X-XSRF-TOKEN",
          decodeURIComponent(xsrfToken)
        );
    - type: after-response
      code: |-
        test("Status code is 200", function () {
          expect(res.getStatus()).to.equal(200);
        });

        test("Response is JSON", function () {
          expect(res.getHeader("content-type")).to.include("application/json");
        });

        test("Headline and summary were updated", function () {
          const body = res.getBody();
          const profile = body.data ?? body;

          expect(profile.headline).to.equal(
            "Full Stack Developer | Laravel and Vue.js"
          );

          expect(profile.professional_summary).to.include(
            "Full Stack Developer focused on building reliable web applications"
          );
        });

        test("Profile completion remains between 0 and 100", function () {
          const body = res.getBody();
          const profile = body.data ?? body;

          expect(profile.profile_completion).to.be.at.least(0);
          expect(profile.profile_completion).to.be.at.most(100);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5