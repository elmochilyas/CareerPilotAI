info:
  name: 04 - Update Ongoing Education
  type: http
  seq: 4

http:
  method: PATCH
  url: "{{baseUrl}}/api/v1/profile/items/{{ongoingEducationItemId}}"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
    - name: Origin
      value: "{{frontendUrl}}"
    - name: Referer
      value: "{{frontendUrl}}/"
  body:
    type: json
    data: |-
      {
        "description": "Updated description for ongoing education."
      }
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const xsrfToken = bru.cookies.get("XSRF-TOKEN");

        if (!xsrfToken) {
          throw new Error(
            "XSRF-TOKEN cookie is missing. Run 02 - CSRF Cookie first."
          );
        }

        req.setHeader(
          "X-XSRF-TOKEN",
          decodeURIComponent(xsrfToken)
        );
    - type: after-response
      code: |-
        test("Status code is 200", function () {
          expect(res.getStatus()).to.equal(200);
        });

        test("Response is JSON", function () {
          expect(res.getHeader("content-type")).to.include("application/json");
        });

        test("Education item was updated", function () {
          const body = res.getBody();
          const item = body.data ?? body;

          expect(item.description).to.equal("Updated description for ongoing education.");
        });

        test("End date remains null", function () {
          const body = res.getBody();
          const item = body.data ?? body;

          expect(item.end_date).to.equal(null);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5