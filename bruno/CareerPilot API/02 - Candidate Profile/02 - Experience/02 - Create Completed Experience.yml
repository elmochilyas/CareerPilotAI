info:
  name: 02 - Create Completed Experience
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/api/v1/profile/items"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
    - name: Origin
      value: "{{frontendUrl}}"
    - name: Referer
      value: "{{frontendUrl}}/"
  body:
    type: json
    data: |-
      {
        "type": "experience",
        "title": "[Bruno Test] Completed Experience",
        "organization": "Beta Inc",
        "location": "Rabat",
        "start_date": "2024-01-01",
        "end_date": "2025-12-31",
        "description": "Contributed to backend API development and database optimization.",
        "metadata": {
          "employment_type": "contract"
        }
      }
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const xsrfToken = bru.cookies.get("XSRF-TOKEN");

        if (!xsrfToken) {
          throw new Error(
            "XSRF-TOKEN cookie is missing. Run 02 - CSRF Cookie first."
          );
        }

        req.setHeader(
          "X-XSRF-TOKEN",
          decodeURIComponent(xsrfToken)
        );
    - type: after-response
      code: |-
        test("Status code is 201", function () {
          expect(res.getStatus()).to.equal(201);
        });

        test("Response is JSON", function () {
          expect(res.getHeader("content-type")).to.include("application/json");
        });

        test("Experience item was created", function () {
          const body = res.getBody();
          const item = body.data ?? body;

          expect(item.type).to.equal("experience");
          expect(item.title).to.equal("[Bruno Test] Completed Experience");
        });

        test("End date is set for completed experience", function () {
          const body = res.getBody();
          const item = body.data ?? body;

          expect(item.end_date).to.equal("2025-12-31");
        });

        const body = res.getBody();
        const item = body.data ?? body;
        bru.setVar("completedExperienceItemId", String(item.id));

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5