info:
  name: 04 - Update Completed Experience To Current
  type: http
  seq: 4

http:
  method: PATCH
  url: "{{baseUrl}}/api/v1/profile/items/{{completedExperienceItemId}}"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
    - name: Origin
      value: "{{frontendUrl}}"
    - name: Referer
      value: "{{frontendUrl}}/"
  body:
    type: json
    data: |-
      {
        "is_current": true
      }
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const xsrfToken = bru.cookies.get("XSRF-TOKEN");

        if (!xsrfToken) {
          throw new Error(
            "XSRF-TOKEN cookie is missing. Run 02 - CSRF Cookie first."
          );
        }

        req.setHeader(
          "X-XSRF-TOKEN",
          decodeURIComponent(xsrfToken)
        );
    - type: after-response
      code: |-
        test("Status code is 200", function () {
          expect(res.getStatus()).to.equal(200);
        });

        test("Response is JSON", function () {
          expect(res.getHeader("content-type")).to.include("application/json");
        });

        test("Item was updated", function () {
          const body = res.getBody();
          const item = body.data ?? body;

          expect(item.title).to.equal("[Bruno Test] Completed Experience");
        });

        test("End date became null when set to current", function () {
          const body = res.getBody();
          const item = body.data ?? body;

          expect(item.end_date).to.equal(null);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5