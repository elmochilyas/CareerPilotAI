info:
  name: 05 - Update Current Experience To Completed
  type: http
  seq: 5

http:
  method: PATCH
  url: "{{baseUrl}}/api/v1/profile/items/{{currentExperienceItemId}}"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
    - name: Origin
      value: "{{frontendUrl}}"
    - name: Referer
      value: "{{frontendUrl}}/"
  body:
    type: json
    data: |-
      {
        "is_current": false,
        "end_date": "2026-06-30"
      }
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const xsrfToken = bru.cookies.get("XSRF-TOKEN");

        if (!xsrfToken) {
          throw new Error(
            "XSRF-TOKEN cookie is missing. Run 02 - CSRF Cookie first."
          );
        }

        req.setHeader(
          "X-XSRF-TOKEN",
          decodeURIComponent(xsrfToken)
        );
    - type: after-response
      code: |-
        test("Status code is 200", function () {
          expect(res.getStatus()).to.equal(200);
        });

        test("Response is JSON", function () {
          expect(res.getHeader("content-type")).to.include("application/json");
        });

        test("Item was updated", function () {
          const body = res.getBody();
          const item = body.data ?? body;

          expect(item.title).to.equal("[Bruno Test] Current Experience");
        });

        test("End date was set when completing experience", function () {
          const body = res.getBody();
          const item = body.data ?? body;

          expect(item.end_date).to.equal("2026-06-30");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5