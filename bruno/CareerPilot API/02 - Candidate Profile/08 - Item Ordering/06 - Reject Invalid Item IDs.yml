info:
  name: 06 - Reject Invalid Item IDs
  type: http
  seq: 6

http:
  method: PATCH
  url: "{{baseUrl}}/api/v1/profile/items/reorder"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
    - name: Origin
      value: "{{frontendUrl}}"
    - name: Referer
      value: "{{frontendUrl}}/"
  body:
    type: json
    data: |-
      {
        "type": "project",
        "item_ids": [99999999]
      }
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const xsrfToken = bru.cookies.get("XSRF-TOKEN");

        if (!xsrfToken) {
          throw new Error(
            "XSRF-TOKEN cookie is missing. Run 02 - CSRF Cookie first."
          );
        }

        req.setHeader(
          "X-XSRF-TOKEN",
          decodeURIComponent(xsrfToken)
        );
    - type: after-response
      code: |-
        test("Status code is 422", function () {
          expect(res.getStatus()).to.equal(422);
        });

        test("Response is JSON", function () {
          expect(res.getHeader("content-type")).to.include("application/json");
        });

        test("Error code is profile_item_reorder_invalid", function () {
          const body = res.getBody();

          expect(body.code).to.equal("profile_item_reorder_invalid");
        });

        test("Item IDs error is present", function () {
          const body = res.getBody();

          expect(body.errors).to.have.property("item_ids");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5