info:
  name: 03 - Get Profile For Reorder
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/api/v1/profile"
  headers:
    - name: Accept
      value: application/json
    - name: Origin
      value: "{{frontendUrl}}"
    - name: Referer
      value: "{{frontendUrl}}/"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        test("Status code is 200", function () {
          expect(res.getStatus()).to.equal(200);
        });

        test("Response is JSON", function () {
          expect(res.getHeader("content-type")).to.include("application/json");
        });

        test("Profile has project items", function () {
          const body = res.getBody();
          const profile = body.data ?? body;

          expect(profile.items).to.have.property("project");
          expect(profile.items.project).to.be.an("array");
          expect(profile.items.project.length).to.be.at.least(2);
        });

        const body = res.getBody();
        const profile = body.data ?? body;
        const projectItems = profile.items.project;
        const allIds = projectItems.map(function (item) {
          return item.id;
        });
        const sortedIds = allIds.slice().sort(function (a, b) {
          return a - b;
        });
        bru.setVar("projectIdsBefore", JSON.stringify(allIds));
        bru.setVar("projectIdsSorted", JSON.stringify(sortedIds));

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5