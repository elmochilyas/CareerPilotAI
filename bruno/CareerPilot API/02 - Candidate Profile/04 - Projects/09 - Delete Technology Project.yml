info:
  name: 09 - Delete Technology Project
  type: http
  seq: 9

http:
  method: DELETE
  url: "{{baseUrl}}/api/v1/profile/items/{{technologyProjectItemId}}"
  headers:
    - name: Accept
      value: application/json
    - name: Origin
      value: "{{frontendUrl}}"
    - name: Referer
      value: "{{frontendUrl}}/"
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const xsrfToken = bru.cookies.get("XSRF-TOKEN");

        if (!xsrfToken) {
          throw new Error(
            "XSRF-TOKEN cookie is missing. Run 02 - CSRF Cookie first."
          );
        }

        req.setHeader(
          "X-XSRF-TOKEN",
          decodeURIComponent(xsrfToken)
        );
    - type: after-response
      code: |-
        test("Status code is 204", function () {
          expect(res.getStatus()).to.equal(204);
        });

        test("No content body is returned for 204", function () {
          const body = res.getBody();

          expect(body === null || body === "").to.equal(true);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5