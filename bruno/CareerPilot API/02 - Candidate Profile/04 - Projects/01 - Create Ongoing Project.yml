info:
  name: 01 - Create Ongoing Project
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/api/v1/profile/items"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
    - name: Origin
      value: "{{frontendUrl}}"
    - name: Referer
      value: "{{frontendUrl}}/"
  body:
    type: json
    data: |-
      {
        "type": "project",
        "title": "[Bruno Test] Ongoing Project",
        "organization": "Self-Employed",
        "location": "Remote",
        "start_date": "2026-03-01",
        "is_current": true,
        "description": "Building a personal portfolio platform.",
        "metadata": {
          "project_url": "https://github.com/bruno-test/portfolio",
          "role": "Solo Developer",
          "technologies": ["Laravel", "Vue.js", "MySQL"]
        }
      }
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const xsrfToken = bru.cookies.get("XSRF-TOKEN");

        if (!xsrfToken) {
          throw new Error(
            "XSRF-TOKEN cookie is missing. Run 02 - CSRF Cookie first."
          );
        }

        req.setHeader(
          "X-XSRF-TOKEN",
          decodeURIComponent(xsrfToken)
        );
    - type: after-response
      code: |-
        test("Status code is 201", function () {
          expect(res.getStatus()).to.equal(201);
        });

        test("Response is JSON", function () {
          expect(res.getHeader("content-type")).to.include("application/json");
        });

        test("Project item was created", function () {
          const body = res.getBody();
          const item = body.data ?? body;

          expect(item.type).to.equal("project");
          expect(item.title).to.equal("[Bruno Test] Ongoing Project");
        });

        test("End date is null for ongoing project", function () {
          const body = res.getBody();
          const item = body.data ?? body;

          expect(item.end_date).to.equal(null);
        });

        test("Technologies array is present", function () {
          const body = res.getBody();
          const item = body.data ?? body;

          expect(item.metadata.technologies).to.be.an("array");
          expect(item.metadata.technologies).to.include("Laravel");
          expect(item.metadata.technologies).to.include("Vue.js");
          expect(item.metadata.technologies).to.include("MySQL");
        });

        const body = res.getBody();
        const item = body.data ?? body;
        bru.setVar("ongoingProjectItemId", String(item.id));

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5