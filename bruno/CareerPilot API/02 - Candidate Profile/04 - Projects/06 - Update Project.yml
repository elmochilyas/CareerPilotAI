info:
  name: 06 - Update Project
  type: http
  seq: 6

http:
  method: PATCH
  url: "{{baseUrl}}/api/v1/profile/items/{{ongoingProjectItemId}}"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
    - name: Origin
      value: "{{frontendUrl}}"
    - name: Referer
      value: "{{frontendUrl}}/"
  body:
    type: json
    data: |-
      {
        "description": "Updated: Building a personal portfolio platform with blog.",
        "metadata": {
          "role": "Full Stack Developer"
        }
      }
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const xsrfToken = bru.cookies.get("XSRF-TOKEN");

        if (!xsrfToken) {
          throw new Error(
            "XSRF-TOKEN cookie is missing. Run 02 - CSRF Cookie first."
          );
        }

        req.setHeader(
          "X-XSRF-TOKEN",
          decodeURIComponent(xsrfToken)
        );
    - type: after-response
      code: |-
        test("Status code is 200", function () {
          expect(res.getStatus()).to.equal(200);
        });

        test("Response is JSON", function () {
          expect(res.getHeader("content-type")).to.include("application/json");
        });

        test("Project was updated", function () {
          const body = res.getBody();
          const item = body.data ?? body;

          expect(item.description).to.include("Updated");
          expect(item.metadata.role).to.equal("Full Stack Developer");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5