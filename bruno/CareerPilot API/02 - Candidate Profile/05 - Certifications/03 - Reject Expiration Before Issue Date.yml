info:
  name: 03 - Reject Expiration Before Issue Date
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/api/v1/profile/items"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
    - name: Origin
      value: "{{frontendUrl}}"
    - name: Referer
      value: "{{frontendUrl}}/"
  body:
    type: json
    data: |-
      {
        "type": "certification",
        "title": "[Bruno Test] Bad Expiry",
        "start_date": "2026-06-01",
        "metadata": {
          "expiry_date": "2025-01-01"
        }
      }
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: |-
        const xsrfToken = bru.cookies.get("XSRF-TOKEN");

        if (!xsrfToken) {
          throw new Error(
            "XSRF-TOKEN cookie is missing. Run 02 - CSRF Cookie first."
          );
        }

        req.setHeader(
          "X-XSRF-TOKEN",
          decodeURIComponent(xsrfToken)
        );
    - type: after-response
      code: |-
        test("Status code is 422", function () {
          expect(res.getStatus()).to.equal(422);
        });

        test("Response is JSON", function () {
          expect(res.getHeader("content-type")).to.include("application/json");
        });

        test("Error code is validation_error", function () {
          const body = res.getBody();

          expect(body.code).to.equal("validation_error");
        });

        test("Expiry date error is present", function () {
          const body = res.getBody();

          expect(body.errors).to.have.property("metadata.expiry_date");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5