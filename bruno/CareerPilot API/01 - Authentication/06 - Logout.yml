info:
  name: 06 - Logout
  type: http
  seq: 1

http:
  method: DELETE
  url: "{{baseUrl}}/api/v1/auth/logout"
  headers:
    - name: Accept
      value: application/json
    - name: Origin
      value: "{{frontendUrl}}"
    - name: Referer
      value: "{{frontendUrl}}/"
    - name: X-XSRF-TOKEN
      value: 
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
