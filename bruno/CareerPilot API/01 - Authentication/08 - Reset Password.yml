info:
  name: 08 - Reset Password
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/api/v1/auth/reset-password"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
    - name: Origin
      value: "{{frontendUrl}}"
    - name: Referer
      value: "{{frontendUrl}}/"
    - name: X-XSRF-TOKEN
      value: 
  body:
    type: json
    data: |-
      {
        "token": "cc82ea0fa6aa77a35b92662babf774e76e1c59e1c9c2bf59f71bcce3f602d1ad",
        "email": "bruno.test@example.com",
        "password": "NewPassword123!",
        "password_confirmation": "NewPassword123!"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
