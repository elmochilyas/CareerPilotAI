info:
  name: 05 - Current User
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/api/v1/me"
  headers:
    - name: Accept
      value: application/json
    - name: Origin
      value: "{{frontendUrl}}"
    - name: Referer
      value: "{{frontendUrl}}/"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
