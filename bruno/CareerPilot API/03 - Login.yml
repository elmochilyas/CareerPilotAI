info:
  name: 03 - Login
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/api/v1/auth/login"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
    - name: Origin
      value: "{{frontendUrl}}"
    - name: Referer
      value: "{{frontendUrl}}/"
    - name: X-XSRF-TOKEN
      value: 
  body:
    type: json
    data: |-
      {
        "email": "bruno.test@example.com",
        "password": "NewPassword123!"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
