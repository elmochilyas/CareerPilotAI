info:
  name: 07 - Forgot Password
  type: http
  seq: 7

http:
  method: POST
  url: "{{baseUrl}}/api/v1/auth/forgot-password"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
    - name: Origin
      value: "{{frontendUrl}}"
    - name: Referer
      value: "{{frontendUrl}}/"
    - name: X-XSRF-TOKEN
      value: 
  body:
    type: json
    data: |-
      {
        "email": "bruno.test@example.com"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
