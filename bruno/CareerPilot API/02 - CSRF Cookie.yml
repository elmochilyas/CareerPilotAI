info:
  name: 02 - CSRF Cookie
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/sanctum/csrf-cookie"
  headers:
    - name: Accept
      value: application/json
    - name: Origin
      value: "{{frontendUrl}}"
    - name: Referer
      value: "{{frontendUrl}}/"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
